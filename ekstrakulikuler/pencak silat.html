<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pencak Silat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(to right, #e0eafc, #cfdef3);
}

/* KOTAK UTAMA */
.foto-box {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 35px;
    padding: 60px;
    max-width: 1200px;
    margin: auto;
}

/* ITEM KOTAK */
.item {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);

    display: flex;
    flex-direction: column; /* FOTO ATAS, TEKS BAWAH */
    transition: 0.3s ease;
}

.item:hover {
    transform: translateY(-10px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.25);
}

/* FOTO */
.item img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

/* TEKS */
.item p {
    padding: 15px 20px;
    font-size: 16px;
    color: #333;
    line-height: 1.7;
    flex-grow: 1; /* bikin teks memanjang ke bawah */
}

/* TOMBOL */
.btn {
    display: block;
    text-align: center;
    margin: 15px 20px 25px;
    padding: 12px;
    background: #4a6cff;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #2f4bd6;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .foto-box {
        padding: 25px;
    }

    .item img {
        height: 180px;
    }
}

</style>
</head>
<body>

<div class="foto-box">

    <div class="foto-box">

    <div class="item">
        <img src="img-ekstra/pencak1.jpeg" alt="Latihan Silat">
        <p>
            Latihan Pencak Silat bersama pelatih untuk meningkatkan kemampuan bela diri,
            disiplin, dan kekompakan antar anggota.
        </p>
        <a href="ekstra.html" class="btn">⬅ Kembali</a>
    </div>

    <div class="item">
        <img src="img-ekstra/pencak silat.jpeg" alt="Lomba Silat">
        <p>
            Penampilan Pencak Silat saat lomba sebagai bentuk prestasi sekolah
            dan ajang menunjukkan bakat para siswa.
        </p>
        <a href="ekstra.html" class="btn">⬅ Kembali</a>
    </div>

</div>



</body>
</html>
